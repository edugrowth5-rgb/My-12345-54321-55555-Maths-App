<!DOCTYPE html>

<head>

    <title>Success Zone | Competitive Maths</title>
    <link rel="stylesheet" href="MBstyle.css">
</head>
<body>
    <header class="top-bar">
        <button id="menu-btn" onclick="toggleSidebar()">☰</button>
        <h1>Success Zone</h1>

            <button onclick="changeFontSize(-1)">A-</button>
            <button onclick="toggleFullScreen()">Full</button>
        </div>
    </header>
    
    <div class="wrapper">
        <aside id="sidebar" class="sidebar">
            <input type="text" id="search" class="search-bar" placeholder="Search Topics..." onkeyup="filterTopics()">
            <nav id="nav-links"></nav>
        </aside>
        
        <main id="content-area" class="content">
            </main>
    </div>
    
    <script src="MBdata1.js"></script>
    <script src="MBquiz1.js"></script>
    <script src="MBscript.js"></script>
</body>
</html>
